name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint, test, build all packages
        run: npx nx run-many -t eslint:lint vitest:test build --parallel=3

      - name: Check library packages declare only permitted runtime dependencies
        run: |
          fail=0
          for pkg in packages/*/package.json; do
            name=$(jq -r '.name' "$pkg")
            case "$name" in
              "@rule-io/cli") allowed='["commander"]' ;;
              *)              allowed='[]' ;;
            esac
            bad=$(jq --argjson allowed "$allowed" -r '
              (.dependencies // {})
              | to_entries
              | map(select(.key | startswith("@rule-io/") | not))
              | map(select(.key as $k | ($allowed | index($k)) | not))
              | .[].key
            ' "$pkg")
            if [ -n "$bad" ]; then
              echo "ERROR: $name ($pkg) declares disallowed external runtime dependencies: $bad"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All packages declare only permitted runtime dependencies."

      - name: Verify build outputs for every package
        run: |
          for pkg in core rcml client vendor-shopify vendor-bookzen vendor-samfora sdk; do
            test -f "dist/packages/$pkg/src/index.js"   || { echo "Missing dist/packages/$pkg/src/index.js"; exit 1; }
            test -f "dist/packages/$pkg/src/index.d.ts" || { echo "Missing dist/packages/$pkg/src/index.d.ts"; exit 1; }
            test -f "dist/packages/$pkg/package.json"   || { echo "Missing dist/packages/$pkg/package.json"; exit 1; }
          done
          test -f "dist/packages/cli/src/cli.js"   || { echo "Missing dist/packages/cli/src/cli.js"; exit 1; }
          test -f "dist/packages/cli/src/cli.d.ts" || { echo "Missing dist/packages/cli/src/cli.d.ts"; exit 1; }
          test -f "dist/packages/cli/package.json" || { echo "Missing dist/packages/cli/package.json"; exit 1; }
          head -1 dist/packages/cli/src/cli.js | grep -q "^#!/usr/bin/env node" \
            || { echo "CLI shebang missing from dist/packages/cli/src/cli.js"; exit 1; }
          echo "All build outputs present for 8 packages."
