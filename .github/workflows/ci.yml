name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test

      - name: Build (CJS + ESM)
        run: npm run build

      - name: Verify dist outputs exist
        run: |
          test -f dist/index.js || (echo "Missing dist/index.js (CJS)" && exit 1)
          test -f dist/index.mjs || (echo "Missing dist/index.mjs (ESM)" && exit 1)
          test -f dist/index.d.ts || (echo "Missing dist/index.d.ts (types)" && exit 1)
          echo "All dist outputs present"

      - name: Check bundle has no dependencies
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { builtinModules } = require('module');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const dependencies = Object.keys(pkg.dependencies || {});
          const optionalDependencies = Object.keys(pkg.optionalDependencies || {});
          const runtimeDependencies = [...dependencies, ...optionalDependencies];

          if (runtimeDependencies.length > 0) {
            console.error(`ERROR: package.json must not declare runtime dependencies: ${runtimeDependencies.join(', ')}`);
            process.exit(1);
          }

          const builtins = new Set([
            ...builtinModules,
            ...builtinModules.map((name) => `node:${name}`),
          ]);

          const distFiles = ['dist/index.js', 'dist/index.mjs'];
          const externalSpecifiers = new Map();

          const addIfExternal = (file, specifier) => {
            if (
              !specifier ||
              specifier.startsWith('./') ||
              specifier.startsWith('../') ||
              specifier.startsWith('/') ||
              builtins.has(specifier)
            ) {
              return;
            }
            if (!externalSpecifiers.has(file)) {
              externalSpecifiers.set(file, new Set());
            }
            externalSpecifiers.get(file).add(specifier);
          };

          for (const file of distFiles) {
            if (!fs.existsSync(file)) continue;
            const source = fs.readFileSync(file, 'utf8');

            for (const match of source.matchAll(/\brequire\s*\(\s*['"]([^'"]+)['"]\s*\)/g)) {
              addIfExternal(file, match[1]);
            }
            for (const match of source.matchAll(/\bimport\s+[^'"]*?\sfrom\s+['"]([^'"]+)['"]/g)) {
              addIfExternal(file, match[1]);
            }
            for (const match of source.matchAll(/\bimport\s*['"]([^'"]+)['"]/g)) {
              addIfExternal(file, match[1]);
            }
            for (const match of source.matchAll(/\bimport\s*\(\s*['"]([^'"]+)['"]\s*\)/g)) {
              addIfExternal(file, match[1]);
            }
            for (const match of source.matchAll(/\bexport\s+(?:\*|\{[^}]*\})\s+from\s+['"]([^'"]+)['"]/g)) {
              addIfExternal(file, match[1]);
            }
          }

          if (externalSpecifiers.size > 0) {
            for (const [file, specifiers] of externalSpecifiers.entries()) {
              console.error(`ERROR: External runtime dependencies in ${file}: ${Array.from(specifiers).sort().join(', ')}`);
            }
            process.exit(1);
          }

          console.log('No runtime dependencies declared or referenced by dist outputs');
          EOF
