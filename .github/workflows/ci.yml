name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Run affected lint/test/build
        run: npx nx affected -t eslint:lint test-ci build --parallel=3

      - name: Check @rule-io/sdk has no runtime dependencies
        run: |
          jq -e '(.dependencies // {}) | length == 0' packages/rule-io-sdk/package.json \
            || (echo "ERROR: packages/rule-io-sdk/package.json must not declare runtime dependencies" && exit 1)
          echo "No runtime dependencies declared"

      - name: Verify build outputs
        run: |
          test -f dist/packages/rule-io-sdk/src/index.js || (echo "Missing index.js" && exit 1)
          test -f dist/packages/rule-io-sdk/src/index.d.ts || (echo "Missing index.d.ts" && exit 1)
          test -f dist/packages/rule-io-sdk/package.json || (echo "Missing published package.json" && exit 1)
          echo "All build outputs present"
