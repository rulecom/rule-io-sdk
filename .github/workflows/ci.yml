name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Run affected lint/test/build
        run: npx nx affected -t eslint:lint test-ci build --parallel=3

      - name: Check no package declares external runtime dependencies
        run: |
          fail=0
          for pkg in packages/*/package.json; do
            name=$(jq -r '.name' "$pkg")
            bad=$(jq -r '(.dependencies // {}) | to_entries | map(select(.key | startswith("@rule-io/") | not)) | .[].key' "$pkg")
            if [ -n "$bad" ]; then
              echo "ERROR: $name ($pkg) declares external runtime dependencies: $bad"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All packages declare only @rule-io/* workspace dependencies."

      - name: Verify build outputs for every package
        run: |
          for pkg in core rcml client vendor-shopify vendor-bookzen vendor-samfora sdk; do
            test -f "dist/packages/$pkg/src/index.js" \
              || (echo "Missing dist/packages/$pkg/src/index.js" && exit 1)
            test -f "dist/packages/$pkg/src/index.d.ts" \
              || (echo "Missing dist/packages/$pkg/src/index.d.ts" && exit 1)
            test -f "dist/packages/$pkg/package.json" \
              || (echo "Missing dist/packages/$pkg/package.json" && exit 1)
          done
          echo "All build outputs present for 7 packages."
