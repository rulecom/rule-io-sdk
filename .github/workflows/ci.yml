name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'CHANGELOG.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'CHANGELOG.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint all packages
        run: npx nx run-many -t eslint:lint --parallel=3

      - name: Test packages (excluding integration)
        run: npx nx run-many -t vitest:test --parallel=3 --exclude=integration

      - name: Build all packages
        run: npx nx run-many -t build --parallel=3

      - name: Check library packages declare only permitted runtime dependencies
        run: |
          fail=0
          for pkg in packages/*/package.json; do
            name=$(jq -r '.name' "$pkg")
            # Per-package allowlist of non-@rulecom/* runtime deps. Adding
            # an entry here means we accept that the dep ships in the
            # published tarball and counts toward each consumer's install
            # footprint.
            case "$name" in
              "@rulecom/rcml")
                # sanitize-url: URL sanitisation used in RCML elements; ajv:
                # JSON-schema validator; prosemirror-model: doc nodes;
                # remark-* / unified / vfile / mdast-*: markdown→RCML pipeline;
                # fast-xml-parser: RCML XML round-trip; zod: runtime schema.
                allowed='["@braintree/sanitize-url","@types/mdast","@types/unist","ajv","fast-xml-parser","mdast-util-directive","prosemirror-model","remark-directive","remark-parse","unified","vfile","zod"]'
                ;;
              "@rulecom/client")
                # sanitize-url: URL sanitisation used when constructing API requests.
                allowed='["@braintree/sanitize-url"]'
                ;;
              "@rulecom/template-engine")
                # No external runtime deps — only @rulecom/rcml (internal).
                allowed='[]'
                ;;
              *)
                allowed='[]'
                ;;
            esac
            bad=$(jq --argjson allowed "$allowed" -r '
              (.dependencies // {})
              | to_entries
              | map(select(.key | startswith("@rulecom/") | not))
              | map(select(.key as $k | ($allowed | index($k)) | not))
              | .[].key
            ' "$pkg")
            if [ -n "$bad" ]; then
              echo "ERROR: $name ($pkg) declares disallowed external runtime dependencies: $bad"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All packages declare only permitted runtime dependencies."

      - name: Verify build outputs for every package
        run: |
          for pkg in rcml client template-engine vendor vendor-shopify vendor-bookzen vendor-samfora sdk; do
            test -f "dist/packages/$pkg/src/index.js"   || { echo "Missing dist/packages/$pkg/src/index.js"; exit 1; }
            test -f "dist/packages/$pkg/src/index.d.ts" || { echo "Missing dist/packages/$pkg/src/index.d.ts"; exit 1; }
            test -f "dist/packages/$pkg/package.json"   || { echo "Missing dist/packages/$pkg/package.json"; exit 1; }
          done
          echo "All build outputs present for 8 packages."

  docs:
    name: Docs Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JSDoc coverage (all public symbols documented)
        run: npx nx run docs:check

      - name: Build docs site (dead-link check)
        run: npx nx run docs:build
